        <section>
            <div class="rating box">
                <h3>User Rating</h3>
                <div class="stars">*****</div>
                <p>4.1 average based on 254 reviews.</p>
                <hr>
                <di class="row">
                    <div class="side">5 star</div>
                    <div class="middle">
                        <div class="bar-container">
                            <div class="bar-5" style="width: 70%"></div>
                            <div class="row">
                          <div class="side">4 star</div>
                        <div class="middle">
                        <div class="bar-container">
                   <div class="bar-4" style="width: 20%"></div>
                   <div class="row">
                  <div class="side">3 star</div>      <div class="middle">
                <div class="bar-container">
          <div class="bar-3" style="width: 5%"></div>
                      <div class="row">
               <div class="side">2 star</div>
                 <div class="middle">
                <div class="bar-container">
                  <div class="bar-2" style="width: 3%"></div>
                      <div class="row">
                          <div class="side">1 star</div>
                          <div class="middle">
                             <div class="bar-container">
                                 <div class="bar-1" style="width: 2%">

                                   </div>
                                  </div>
                                                                                

                                  <div class="container">
                                    <form action="https://formsubmit.co/bdeserome@gmail.com" method="POST">
                                    <!-- your inputs here -->
                                            </form>
                                     <form id="feedbackForm">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="First Name" placeholder="Enter your first name" required>
            </div>
            
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="Last Name" placeholder="Enter your last name" required>
            </div>
            
            <div class="form-group">
                <label>Country *</label>
                <select name="Country" required>
                    <option value="">Select your country</option>
                    <option value="Botswana">🇧🇼 Botswana</option>
                    <option value="South Africa">🇿🇦 South Africa</option>
                    <option value="Namibia">🇳🇦 Namibia</option>
                    <option value="Zimbabwe">🇿🇼 Zimbabwe</option>
                    <option value="Zambia">🇿🇲 Zambia</option>
                    <option value="Other">🌍 Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Your Feedback *</label>
                <textarea name="Feedback" placeholder="We'd love to hear your thoughts, suggestions, or concerns..." required></textarea>
            </div>
            
            <button type="submit">✨ Submit Feedback</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Sending your feedback...</p>
            </div>
            
            <div class="message" id="message"></div>
        </form>
